<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Shaik Fayaz</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e11414, #203970, #0b782c);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .welcome-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 60px 50px;
            border-radius: 30px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: fadeInUP 1.5s ease-out forwards;
            opacity: 0;
            transform: translateY(30px);
            max-width: 600px;
            width: 90%;
            z-index: 10;
        }

        @keyframes fadeInUP {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .welcome-title {
            font-family: 'Poppins', sans-serif;
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #ffffff;
            letter-spacing: 2px;
        }

        .welcome-title span {
            color: #00e5ff;
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
        }

        .welcome-text {
            font-size: 20px;
            color: #cbd5e1;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .enter-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 40px;
            background: #00e5ff;
            color: black;
            font-size: 20px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
            font-family: 'Inter', sans-serif;
        }

        .enter-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: all 0.5s ease;
            z-index: -1;
        }

        .enter-btn:hover::before {
            left: 100%;
        }

        .enter-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 229, 255, 0.6);
            background: white;
        }

        /* Floating particles background effect */
        .particle {
            position: absolute;
            background: rgba(0, 229, 255, 0.5);
            border-radius: 50%;
            animation: float 10s infinite linear;
            bottom: -50px;
        }

        @keyframes float {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-120vh) translateX(20px);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <!-- Simple animated particles -->
    <div class="particle" style="width: 15px; height: 15px; left: 10%; animation-duration: 8s;"></div>
    <div class="particle" style="width: 25px; height: 25px; left: 30%; animation-duration: 12s; animation-delay: 2s;">
    </div>
    <div class="particle" style="width: 10px; height: 10px; left: 60%; animation-duration: 6s; animation-delay: 1s;">
    </div>
    <div class="particle" style="width: 20px; height: 20px; left: 80%; animation-duration: 10s; animation-delay: 3s;">
    </div>
    <div class="particle" style="width: 12px; height: 12px; left: 50%; animation-duration: 9s; animation-delay: 4s;">
    </div>
    <div class="particle" style="width: 18px; height: 18px; left: 20%; animation-duration: 11s; animation-delay: 5s;">
    </div>
    <div class="particle" style="width: 14px; height: 14px; left: 75%; animation-duration: 7s; animation-delay: 2.5s;">
    </div>

    <div class="welcome-container">
        <h1><span>SHAIK FAYAZ</span></h1>
        <h1 class="welcome-title">Welcome to<br><span>My Portfolio</span></h1>
        <p class="welcome-text">Discover my work, skills, and journey as a passionate Computer Science Student &
            Developer.</p>
        <a href="home.html" class="enter-btn">Enter Portfolio</a>
    </div>

</body>

</html>
